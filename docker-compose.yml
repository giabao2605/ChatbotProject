# ============================================================
# Docker Compose — Mechanical Engineering RAG Chatbot
# ============================================================
# Services:
#   1. streamlit       — Web UI (port 8501)
#   2. rag-server      — FastAPI RAG backend (port 8100)
#   3. ingestion-worker — Background document processing
# ============================================================
# External dependencies (not managed by this compose):
#   - SQL Server       — localhost\SQLEXPRESS or remote
#   - Qdrant Cloud     — managed service (QDRANT_URL in .env)
# ============================================================

version: '3.8'

services:
  # ----------------------------------------------------------
  # RAG Backend — FastAPI (persistent model server)
  # ----------------------------------------------------------
  rag-server:
    build:
      context: .
      dockerfile: Dockerfile
    command: python rag_server.py
    env_file: .env
    environment:
      - RAG_SERVER_HOST=0.0.0.0
      - RAG_SERVER_PORT=8100
      - MAX_CONCURRENT_RAG=2
    ports:
      - "8100:8100"
    volumes:
      - ./Data_Anh_Da_Tach:/app/Data_Anh_Da_Tach:ro
      - ./Data_Goc:/app/Data_Goc:ro
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s  # Models take time to load
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # ----------------------------------------------------------
  # Streamlit UI
  # ----------------------------------------------------------
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    env_file: .env
    environment:
      - RAG_SERVER_URL=http://rag-server:8100
    ports:
      - "8501:8501"
    volumes:
      - ./Data_Anh_Da_Tach:/app/Data_Anh_Da_Tach:ro
      - ./Data_Goc:/app/Data_Goc
      - ./logs:/app/logs
    depends_on:
      rag-server:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # ----------------------------------------------------------
  # Ingestion Worker — Background document processing
  # ----------------------------------------------------------
  ingestion-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python scripts/ingestion_worker.py
    env_file: .env
    volumes:
      - ./Data_Goc:/app/Data_Goc
      - ./Data_Anh_Da_Tach:/app/Data_Anh_Da_Tach
      - ./logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
