[pytest]
# Khung test cho Mech Chatbot
# Chay:  pytest -m unit            (test logic thuan, khong can DB/Qdrant)
#        pytest -m "not integration and not eval"   (CI nhanh)
#        RUN_DB_TESTS=1 pytest -m integration
#        RUN_EVAL_TESTS=1 RAG_SERVER_URL=http://localhost:8100 pytest -m eval
addopts = -ra -q --strict-markers
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: logic thuan, chay nhanh, khong phu thuoc DB/Qdrant/LLM (chay trong CI)
    integration: can SQL Server / Qdrant that (bat bang RUN_DB_TESTS=1 / RUN_QDRANT_TESTS=1)
    eval: danh gia chat luong RAG, can RAG server dang chay (RAG_SERVER_URL)
    security: kiem tra RBAC / phan quyen / ro ri du lieu (uu tien cao nhat)
    slow: test cham
