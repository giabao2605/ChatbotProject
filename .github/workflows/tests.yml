# P0 #2 — CI chay test moi commit / pull request.
# Dat file nay tai: .github/workflows/tests.yml
#
# Chi chay nhom test NHANH (unit + security), KHONG chay integration/eval
# (vi can SQL Server / Qdrant / RAG server that).
name: tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
          # qdrant-client chi can phan `models` (khong can server) de test RBAC.
          # Cai rieng o day cho CI nhe, khong keo ca requirements.txt nang.
          pip install "qdrant-client>=1.7"

      - name: Run fast tests (unit + security)
        run: pytest -m "not integration and not eval" -v
