# ============================================================
# Docker Compose — Mechanical Engineering RAG Chatbot
# ============================================================
# Services:
#   1. streamlit       — Web UI (port 8501)
#   2. rag-server      — FastAPI RAG backend (port 8100)
#   3. ingestion-worker — Background document processing
# ============================================================
# External dependencies (not managed by this compose):
#   - SQL Server       — localhost\SQLEXPRESS or remote
#   - Qdrant Cloud     — managed service (QDRANT_URL in .env)
# ============================================================

version: '3.8'

services:
  # ----------------------------------------------------------
  # RAG Backend — FastAPI (persistent model server)
  # ----------------------------------------------------------
  rag-server:
    build:
      context: ..
      dockerfile: Dockerfile
    command: python -m mech_chatbot.api.rag_server
    env_file: ../.env
    environment:
      - RAG_SERVER_HOST=0.0.0.0
      - RAG_SERVER_PORT=8100
      - MAX_CONCURRENT_RAG=4
      - RAG_REQUIRE_SERVICE_AUTH=true
      - SEMANTIC_CACHE_ENABLED=true
      - SEMANTIC_CACHE_SIM_THRESHOLD=0.93
      - SEMANTIC_CACHE_TTL_HOURS=24
      - PYTHONPATH=/app/src
    ports:
      - "127.0.0.1:8100:8100"
    volumes:
      - ../data/processed:/app/data/processed:ro
      - ../data/raw:/app/data/raw:ro
      - ../logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s  # Models take time to load
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # ----------------------------------------------------------
  # Streamlit UI
  # ----------------------------------------------------------
  streamlit:
    build:
      context: ..
      dockerfile: Dockerfile
    command: streamlit run run.py --server.port 8501 --server.address 0.0.0.0
    env_file: ../.env
    environment:
      - RAG_SERVER_URL=http://rag-server:8100
      - PYTHONPATH=/app/src
    ports:
      - "8501:8501"
    volumes:
      - ../data/processed:/app/data/processed:ro
      - ../data/raw:/app/data/raw
      - ../logs:/app/logs
    depends_on:
      rag-server:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # ----------------------------------------------------------
  # Ingestion Worker — Background document processing
  # ----------------------------------------------------------
  ingestion-worker:
    build:
      context: ..
      dockerfile: Dockerfile
    command: python -m mech_chatbot.workers.ingestion_worker
    env_file: ../.env
    environment:
      - PYTHONPATH=/app/src
    volumes:
      - ../data/raw:/app/data/raw
      - ../data/processed:/app/data/processed
      - ../logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
