[pytest]
markers =
    unit: test thuan, khong can DB/Qdrant/LLM/Server
    integration: can DB va/hoac Qdrant that (RUN_DB_TESTS / RUN_QDRANT_TESTS)
    eval: can RAG server dang chay (RAG_SERVER_URL)
    security: test phan quyen / RBAC (uu tien cao nhat)
    slow: test chay lau
    l1: Tang 1 - Du lieu / SQL
    l2: Tang 2 - Vector store / Qdrant
    l3: Tang 3 - Pipeline ingest
    l4: Tang 4 - Bao mat / RBAC
    l5: Tang 5 - RAG core & chong bia
    l6: Tang 6 - API & Worker
    l7: Tang 7 - UI / E2E
addopts = -ra
testpaths = .
