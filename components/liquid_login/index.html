<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Liquid Glass Login</title>
</head>

<body>
  <main class="main">
    <h1 class="heading">OminiBase AI</h1>

    <div class="liquid-glass">
      <div class="liquid-glass--bend"></div>
      <div class="liquid-glass--face"></div>
      <div class="liquid-glass--edge"></div>

      <div class="glass-drag-handle"></div>

      <div class="liquid-glass__menus">
        <form class="login-form" action="#" method="POST">
          <h2>Sign In</h2>

          <div class="input-group">
            <input id="username" type="text" placeholder="Username" autocomplete="username" required />
          </div>

          <div class="input-group password-group">
            <input id="password" type="password" placeholder="Password" autocomplete="current-password" required />
            <button id="togglePassword" class="password-toggle" type="button" aria-label="Hiện mật khẩu"
              title="Hiện mật khẩu">
              <span id="passwordToggleText">Hiện</span>
            </button>
          </div>

          <div id="errorMessage" class="error-message"></div>

          <button type="submit">Login</button>
        </form>
      </div>
    </div>
  </main>

  <!-- SVG Filter: giữ hiệu ứng liquid glass gốc -->
  <svg style="display: none" xmlns="http://www.w3.org/2000/svg">
    <filter id="filter" x="0" y="0" width="100%" height="100%" filterUnits="objectBoundingBox">
      <feTurbulence type="fractalNoise" baseFrequency="0.003 0.007" numOctaves="1" result="turbulence" />
      <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="200" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>

  <!-- Local bridge, không dùng CDN -->
  <script src="streamlit-shim.js"></script>
  <script src="script.js"></script>
</body>

</html>
